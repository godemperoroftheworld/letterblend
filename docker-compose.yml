services:
  letterblend-scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
      args:
        PORT: 1000
    expose:
      - "1000"
    networks:
      - letterblend-network
  letterblend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PORT: 2000
    environment:
      SCRAPE_SERVICE: http://letterblend-scraper:1000
      MOVIE_API: ${MOVIE_API}
      POSTER_API: ${POSTER_API}
      MONGO_PATH: ${MONGO_PATH}
    expose:
      - "2000"
    networks:
      - letterblend-network
  letterblend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PORT: 8080
        BFF_URL: http://letterblend-api:2000
    environment:
      NUXT_BFF_URL: http://letterblend-api:2000
    ports:
      - "8080:8080"
    networks:
      - letterblend-network
networks:
  letterblend-network:
    driver: bridge