services:
  letterblend-scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
      args:
        PORT: 1000
    expose:
      - "1000"
    networks:
      - letterblend-network
  letterblend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PORT: 2000
        SCRAPE_SERVICE: http://letterblend-scraper:1000
        MOVIE_API: ${MOVIE_API}
        POSTER_API: ${POSTER_API}
        MONGO_PATH: ${MONGO_PATH}
    expose:
      - "2000"
    networks:
      - letterblend-network
  letterblend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BFF_URL: http://letterblend-api:2000
        PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - letterblend-network
networks:
  letterblend-network:
    driver: bridge